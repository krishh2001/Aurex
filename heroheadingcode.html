<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About Page - Dark Futuristic</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        :root {
            --bg-color: #050505;
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #888;
            --accent-glow: rgba(16, 185, 129, 0.15);
            --accent-color: #10b981;
            --font-family: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-color);
            font-family: var(--font-family);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            position: relative;
            color: var(--text-main);
        }

        /* Glows */
        .ambient-glow,
        .ambient-glow-2,
        .ambient-glow-3 {
            position: absolute;
            pointer-events: none;
            z-index: 0;
            border-radius: 50%;
        }

        .ambient-glow {
            top: -120px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 500px;
            background: radial-gradient(circle, rgba(16,185,129,0.15), transparent 70%);
        }

        .ambient-glow-2 {
            top: 50%;
            right: 10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(16, 112, 255, 0.1), transparent 70%);
        }

        .ambient-glow-3 {
            bottom: 10%;
            left: 10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(72,117,141,0.1), transparent 70%);
        }

        /* Background big text */
        .bg-large-text {
            position: absolute;
            top: 18%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12rem;
            font-weight: 800;
            color: rgba(255,255,255,0.03);
            letter-spacing: 12px;
            text-transform: uppercase;
            z-index: 0;
            pointer-events: none;
            user-select: none;
        }

        /* Particles */
        .particles {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            animation: float 15s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
        }

        /* Tech lines */
        .tech-line {
            position: absolute;
            top: 20%;
            width: 150px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            z-index: 1;
        }

        .tech-line::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            top: -2px;
            box-shadow: 0 0 10px #fff;
        }

        .left-line { left: -20px; transform: rotate(45deg); }
        .left-line::after { right: 0; }
        .right-line { right: -20px; transform: rotate(-45deg); }
        .right-line::after { left: 0; }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 8px 12px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            z-index: 100;
            transition: 0.3s;
        }

        .navbar.scrolled {
            top: 15px;
            padding: 6px 10px;
            background: rgba(10,10,10,0.85);
        }

        .nav-logo {
            width: 32px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            color: #aaa;
        }

        .nav-links { display: flex; list-style: none; gap: 5px; }
        .nav-links a {
            padding: 8px 16px;
            font-size: .9rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 20px;
            transition: 0.3s ease;
        }
        .nav-links a:hover,
        .nav-links a.active {
            background: rgba(255,255,255,0.08);
            color: #fff;
        }

        .nav-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.1);
            color: #fff;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .nav-btn:hover {
            background: var(--accent-color);
            color: #000;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <div class="ambient-glow"></div>
    <div class="ambient-glow-2"></div>
    <div class="ambient-glow-3"></div>

    <div class="particles" id="particles"></div>

    <div class="tech-line left-line"></div>
    <div class="tech-line right-line"></div>

    <h1 class="bg-large-text">ABOUT</h1>

    <nav class="navbar" id="navbar">
        <div class="nav-logo"><i class="ri-settings-3-fill"></i></div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Integrations</a></li>
            <li><a href="#">Pricing</a></li>
            <li><a href="#">Logs</a></li>
            <li><a href="#" class="active">About</a></li>
        </ul>
        <a href="#" class="nav-btn">Get Template <i class="ri-arrow-right-up-line"></i></a>
    </nav>

    <script src="/script.js"></script>

</body>
</html>
