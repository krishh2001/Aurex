<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Footer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        :root {
            --bg-color: #030303;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent-color: #10b981; /* Emerald Green */
            --border-color: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        /* --- FOOTER CONTAINER --- */
        .site-footer {
            position: relative;
            background-color: #050505;
            padding: 100px 0 40px;
            overflow: hidden;
            border-top: 1px solid var(--border-color);
        }

        /* Background Watermark */
        .bg-large-text {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18vw;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.02);
            letter-spacing: -5px;
            text-transform: uppercase;
            z-index: 0;
            pointer-events: none;
            white-space: nowrap;
            user-select: none;
        }

        .footer-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 40px;
            position: relative;
            z-index: 1;
        }

        /* --- TOP SECTION (Grid Layout) --- */
        .footer-top {
            display: grid;
            /* 5 Columns: Logo takes 1.5 space, Links take 1 space each */
            grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr;
            gap: 40px;
            margin-bottom: 80px;
            align-items: start;
        }

        /* Logo Area */
        .footer-brand {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .footer-logo {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: #fff;
            text-transform: uppercase;
        }

        .slogan {
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
            opacity: 0.7;
        }

        /* Link Columns */
        .footer-col {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .footer-col h4 {
            color: #fff;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 5px;
            opacity: 0; /* Hidden header for alignment if needed, or use it */
            display: none; /* Hiding headers to match your screenshot exactly */
        }

        .footer-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            position: relative;
            width: fit-content;
        }

        /* Hover Effect: Slide & Color */
        .footer-link:hover {
            color: var(--accent-color);
            transform: translateX(5px);
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }

        .footer-link::before {
            content: '→';
            position: absolute;
            left: -15px;
            opacity: 0;
            transition: 0.3s;
            color: var(--accent-color);
        }

        .footer-link:hover::before {
            opacity: 1;
            left: -20px;
        }

        /* --- DIVIDER --- */
        .footer-divider {
            border: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-color), transparent);
            margin-bottom: 50px;
            width: 100%;
        }

        /* --- BOTTOM SECTION --- */
        .footer-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* Social Icons */
        .social-links {
            display: flex;
            gap: 20px;
        }

        .social-btn {
            width: 45px;
            height: 45px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ccc;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 1.1rem;
            background: transparent;
        }

        .social-btn:hover {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: #000;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
        }

        /* Copyright */
        .copyright {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 1024px) {
            .footer-top {
                grid-template-columns: 1fr 1fr 1fr; /* 3 Columns */
                gap: 50px;
            }
            .footer-brand {
                grid-column: span 3;
                text-align: center;
                margin-bottom: 20px;
            }
            .footer-col {
                align-items: center;
            }
        }

        @media (max-width: 600px) {
            .footer-top {
                grid-template-columns: 1fr; /* 1 Column */
                gap: 40px;
                text-align: center;
            }
            .footer-brand {
                grid-column: span 1;
            }
            .bg-large-text {
                font-size: 25vw;
            }
            .footer-link:hover {
                transform: translateX(0); /* No slide on mobile */
            }
        }
    </style>
</head>
<body>

    <footer class="site-footer">
        
        <h1 class="bg-large-text">FOOTER</h1>

        <div class="footer-container">
            
            <div class="footer-top">
                
                <div class="footer-brand">
                    <div class="footer-logo">LOGO</div>
                    <span class="slogan">SLOGAN COMPANY</span>
                </div>

                <div class="footer-col">
                    <a href="#" class="footer-link">Weebly Themes</a>
                    <a href="#" class="footer-link">Pre-Sale FAQs</a>
                    <a href="#" class="footer-link">Submit a Ticket</a>
                </div>

                <div class="footer-col">
                    <a href="#" class="footer-link">Services</a>
                    <a href="#" class="footer-link">Theme Tweak</a>
                </div>

                <div class="footer-col">
                    <a href="#" class="footer-link">Showcase</a>
                    <a href="#" class="footer-link">Widgetkit</a>
                    <a href="#" class="footer-link">Support</a>
                </div>

                <div class="footer-col">
                    <a href="#" class="footer-link">About Us</a>
                    <a href="#" class="footer-link">Contact Us</a>
                    <a href="#" class="footer-link">Affiliates</a>
                    <a href="#" class="footer-link">Resources</a>
                </div>

            </div>

            <hr class="footer-divider">

            <div class="footer-bottom">
                <div class="social-links">
                    <a href="#" class="social-btn"><i class="ri-facebook-fill"></i></a>
                    <a href="#" class="social-btn"><i class="ri-twitter-x-line"></i></a>
                    <a href="#" class="social-btn"><i class="ri-rss-fill"></i></a>
                    <a href="#" class="social-btn"><i class="ri-google-fill"></i></a>
                    <a href="#" class="social-btn"><i class="ri-more-fill"></i></a>
                </div>
                <p class="copyright">&copy; Copyright 2024. All rights reserved.</p>
            </div>

        </div>
    </footer>

</body>
</html>
