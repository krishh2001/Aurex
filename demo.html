<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Tech Curve</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --text-muted: #94a3b8;
            --line-color: rgba(255, 255, 255, 0.15);
            --icon-bg: rgba(20, 20, 20, 0.8);
            --icon-border: rgba(255, 255, 255, 0.15);
            --accent-color: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-color);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .glow-spot {
            position: absolute;
            width: 600px;
            height: 400px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 0;
            pointer-events: none;
            filter: blur(100px);
        }

        .tech-section {
            width: 100%;
            max-width: 1400px;
            padding: 100px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .badge {
            color: var(--accent-color);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: rgba(59, 130, 246, 0.1);
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .heading {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtext {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
            max-width: 680px;
            margin-bottom: -100px;
        }

        /* --- Curve System --- */
        .curve-stage {
            position: relative;
            width: 100%;
            height: 400px;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        .curve-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .curve-path {
            fill: none;
            stroke: var(--line-color);
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-dasharray: 6 6;
        }

        /* Fade Mask */
        .curve-stage::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, var(--bg-color) 0%, transparent 15%, transparent 85%, var(--bg-color) 100%);
            z-index: 20;
            pointer-events: none;
        }

        /* --- Tech Icons --- */
        .icon-bubble {
            position: absolute;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--icon-bg);
            border: 1px solid var(--icon-border);
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            will-change: transform;
            transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .icon-bubble i {
            font-size: 1.8rem;
            /* No default color here, color is set inline by JS */
        }

        .icon-bubble:hover {
            border-color: #fff;
            background: rgba(40, 40, 45, 1);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
            z-index: 30;
            transform: scale(1.2) !important;
            /* Slight pop on hover */
        }

        @media (max-width: 768px) {
            .heading {
                font-size: 2.5rem;
            }

            .subtext {
                padding: 0 20px;
            }

            .curve-stage {
                height: 300px;
            }

            .icon-bubble {
                width: 50px;
                height: 50px;
            }

            .icon-bubble i {
                font-size: 1.4rem;
            }
        }
    </style>
</head>

<body>

    <div class="glow-spot"></div>

    <section class="tech-section">

        <div class="badge">Our Arsenal</div>

        <h2 class="heading">
            Built with Modern<br>
            High-Performance Tech
        </h2>

        <p class="subtext">
            We leverage the latest frameworks and tools to ensure your application is
            fast, scalable, and future-proof.
        </p>

        <div class="curve-stage" id="stage">
            <svg class="curve-svg">
                <path id="curvePath" class="curve-path" />
            </svg>

        </div>

    </section>

    <script>
        // --- CONFIGURATION with BRAND COLORS ---
        const techStack = [
            { icon: 'ri-html5-fill', color: '#E34F26' },       // HTML5 Orange
            { icon: 'ri-css3-fill', color: '#1572B6' },        // CSS3 Blue
            { icon: 'ri-javascript-fill', color: '#F7DF1E' },  // JS Yellow
            { icon: 'ri-reactjs-line', color: '#61DAFB' },     // React Cyan
            { icon: 'ri-nextjs-fill', color: '#FFFFFF' },      // NextJS White
            { icon: 'ri-vuejs-fill', color: '#4FC08D' },       // Vue Green
            { icon: 'ri-angularjs-fill', color: '#DD0031' },   // Angular Red
            { icon: 'ri-nodejs-line', color: '#339933' },      // Node Green
            { icon: 'ri-database-2-line', color: '#336791' },  // SQL Blue
            { icon: 'ri-amazon-fill', color: '#FF9900' },      // AWS Orange
            { icon: 'ri-google-fill', color: '#EA4335' },      // Google Red
            { icon: 'ri-github-fill', color: '#ffffff' },      // GitHub White
            { icon: 'ri-gitlab-fill', color: '#FC6D26' },      // GitLab Orange
            { icon: 'ri-stack-line', color: '#3b82f6' },       // Stack Blue
            { icon: 'ri-android-fill', color: '#3DDC84' },     // Android Green
            { icon: 'ri-apple-fill', color: '#A2AAAD' },       // Apple Silver
            { icon: 'ri-flutter-fill', color: '#02569B' },     // Flutter Blue
            { icon: 'ri-ubuntu-fill', color: '#E95420' },      // Ubuntu Orange
            { icon: 'ri-windows-fill', color: '#0078D6' },     // Windows Blue
            { icon: 'ri-chrome-fill', color: '#4285F4' }       // Chrome Blue
        ];

        // 2. Settings
        const stage = document.getElementById('stage');
        const curvePath = document.getElementById('curvePath');

        // Physics / Geometry
        const iconSpacing = 110; // Space between icons
        const animationSpeed = 0.6; // Movement speed
        const steepness = 1800; // Curve shape
        const vertexOffset = 50; // Padding from bottom

        let width, height, centerX, vertexY;
        let iconElements = [];

        // --- INITIALIZATION ---
        function init() {
            // Clear existing
            const existing = document.querySelectorAll('.icon-bubble');
            existing.forEach(e => e.remove());
            iconElements = [];

            updateDimensions();

            // Create Icon Elements
            techStack.forEach((tech, index) => {
                const el = document.createElement('div');
                el.className = 'icon-bubble';
                // Apply Brand Color inline
                el.style.color = tech.color;
                el.style.borderColor = `${tech.color}40`; // 25% opacity border
                el.style.boxShadow = `0 10px 20px ${tech.color}15`; // Subtle glow

                el.innerHTML = `<i class="${tech.icon}"></i>`;
                stage.appendChild(el);

                // Start them spaced out from left to right
                const startX = (index * iconSpacing) - (techStack.length * iconSpacing) / 2;

                iconElements.push({
                    el: el,
                    x: startX
                });
            });

            // Start Animation Loop
            animate();
        }

        // --- GEOMETRY UPDATE ---
        function updateDimensions() {
            width = stage.offsetWidth;
            height = stage.offsetHeight;
            centerX = width / 2;
            vertexY = height - vertexOffset;
            drawCurve();
        }

        // --- DRAW SVG LINE ---
        function drawCurve() {
            const drawWidth = width / 2 + 400; // Draw extra wide to prevent line clipping

            let pathData = `M ${-drawWidth + centerX} ${getCurveY(-drawWidth)}`;

            for (let x = -drawWidth; x <= drawWidth; x += 10) {
                pathData += ` L ${x + centerX} ${getCurveY(x)}`;
            }

            curvePath.setAttribute('d', pathData);
        }

        // Helper to get Y position on curve based on X
        function getCurveY(x) {
            return vertexY - (Math.pow(x, 2) / steepness);
        }

        // --- ANIMATION LOOP ---
        function animate() {
            // Reset limit: when an icon goes too far right, move it to far left
            const totalWidth = techStack.length * iconSpacing;
            const boundary = totalWidth / 2;

            iconElements.forEach(iconObj => {
                // 1. Move X
                iconObj.x += animationSpeed;

                // 2. Infinite Loop Logic
                if (iconObj.x > boundary) {
                    iconObj.x -= totalWidth;
                }

                // 3. Calculate Y
                const currentY = getCurveY(iconObj.x);

                // 4. Apply Transform
                iconObj.el.style.left = `${iconObj.x + centerX - 32}px`; // -32 is half width
                iconObj.el.style.top = `${currentY - 32}px`;
            });

            requestAnimationFrame(animate);
        }

        // --- EVENTS ---
        window.addEventListener('resize', () => {
            updateDimensions();
        });

        document.addEventListener('DOMContentLoaded', init);

    </script>

</body>

</html>
